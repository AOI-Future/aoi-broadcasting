name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    if: github.repository_visibility == 'public'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true # Keep it non-blocking as per requester's suggestion

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      # Autobuild is commented out for Python to avoid "python2: not found" warnings
      # and because it's not strictly necessary for Python extraction.
      # - name: Autobuild
      #   uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          upload: false
