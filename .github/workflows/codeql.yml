name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # continue-on-error: true # Keep it non-blocking if there's a risk of failure

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Explicitly set the python executable to avoid python2 warnings
          # But as of v3.25.0 this is deprecated/ignored.
          # The best way to fix "python2 not found" in autobuild is to not use autobuild for python
          # since it's not strictly necessary for python extraction.

      # - name: Autobuild
      #   uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          upload: true
