services:
  streamer:
    build: .
    container_name: aoi-broadcasting
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    env_file:
      - .env
    volumes:
      - ./music:/data/music
      - ./archive:/data/archive
      - ./normalized:/data/normalized
      - ./assets:/app/assets:ro
